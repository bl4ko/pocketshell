name: pocketshell
options:
  bundleIdPrefix: com.bl4ko
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    DEVELOPMENT_TEAM: 55S37D9HA7
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
packages:
  Core:
    path: Packages/Core
targets:
  pocketshell:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - target: pocketshellWidget
        platformFilter: iOS
      - target: pocketshellWatch
        platformFilter: iOS
      - package: Core
        products:
          - Models
          - KeyKit
          - SSHKit
          - ReconnectKit
          - TmuxKit
          - TerminalUI
          - ToolbarUI
          - LockKit
          - MonitorKit
          - SFTPKit
      - package: Core
        products:
          - VNCKit
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connects to SSH hosts on your local network.
        NSFaceIDUsageDescription: Unlock pocketshell.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - com.bl4ko.pocketshell.refresh
        UIBackgroundModes:
          - fetch
    entitlements:
      path: App/pocketshell.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bl4ko.pocketshell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bl4ko.pocketshell
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: YES
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
  pocketshellWatch:
    type: application
    platform: watchOS
    sources:
      - WatchApp
    dependencies:
      - package: Core
        products:
          - Models
    info:
      path: WatchApp/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.bl4ko.pocketshell
        CFBundleDisplayName: pocketshell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bl4ko.pocketshell.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
  pocketshellWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
    dependencies:
      - package: Core
        products:
          - Models
    info:
      path: Widget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/pocketshellWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bl4ko.pocketshell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bl4ko.pocketshell.widget
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: YES
  pocketshellUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: pocketshell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bl4ko.pocketshell.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: pocketshell
schemes:
  pocketshell:
    build:
      targets:
        pocketshell: all
        pocketshellUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - pocketshellUITests
  pocketshellWatch:
    build:
      targets:
        pocketshellWatch: all
    run:
      config: Debug
